name: Robotics CI/CD

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nuttx-build-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            genromfs \
            gperf \
            libncurses5-dev \
            libncursesw5-dev \
            pkg-config \
            python3
          if apt-cache show kconfig-frontends >/dev/null 2>&1; then
            sudo apt-get install -y kconfig-frontends
          else
            export NUTTXTOOLS="${HOME}/nuttx-tools"
            mkdir -p "${NUTTXTOOLS}"
            source nuttx/tools/ci/platforms/ubuntu.sh
            kconfig_frontends
            echo "${NUTTXTOOLS}/kconfig-frontends/bin" >> "${GITHUB_PATH}"
          fi

      - name: Verify submodules
        run: |
          test -d nuttx
          test -d nuttx-apps
          git submodule status

      - name: Configure NuttX (sim:nsh)
        run: |
          cd nuttx
          ./tools/configure.sh -a ../nuttx-apps sim:nsh

      - name: Build NuttX
        run: |
          cd nuttx
          make -j"$(nproc)"

      - name: Package build artifacts
        run: |
          mkdir -p artifacts
          cp nuttx/nuttx artifacts/ || true
          cp nuttx/System.map artifacts/ || true
          cp nuttx/.config artifacts/ || true
          tar -czf "nuttx-sim-nsh-${GITHUB_SHA}.tar.gz" -C artifacts .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuttx-sim-nsh-build
          path: nuttx-sim-nsh-${{ github.sha }}.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: nuttx-build-smoke
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nuttx-sim-nsh-build
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
