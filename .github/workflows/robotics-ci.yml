name: Robotics CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  nuttx-sim-smoke:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/dheerajsingh1107/nuttx-ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify submodules
        run: |
          test -d nuttx
          test -d nuttx-apps
          git submodule status

      - name: Configure NuttX
        run: |
          cd nuttx
          ./tools/configure.sh -l sim:nsh
          make olddefconfig

      - name: Build
        run: |
          cd nuttx
          make -j$(nproc)

      - name: Run simulation
        run: |
          cd nuttx
          chmod +x ./nuttx
          timeout 15s ./nuttx > ../sim.log 2>&1 || true

      - name: Show boot log
        run: |
          cat sim.log

      - name: Verify NSH prompt
        run: |
          grep -q "nsh>" sim.log