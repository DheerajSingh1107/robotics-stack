name: Auto Bump Submodules

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Update tracked submodules
        id: update
        run: |
          git submodule sync --recursive
          git submodule update --init --remote nuttx nuttx-apps

          if git diff --quiet -- nuttx nuttx-apps; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push gitlink updates
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add nuttx nuttx-apps
          git commit -m "chore(submodules): auto-bump nuttx and nuttx-apps [skip ci]"
          git push
